<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="World Cup Boyz">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3220"/>
      <stop offset="100%" stop-color="#061a0e"/>
    </linearGradient>
    <radialGradient id="ball" cx="40%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#ededed"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </radialGradient>
    <radialGradient id="gleam" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ballClip"><circle cx="256" cy="256" r="186"/></clipPath>
  </defs>

  <!-- Pitch background, rounded square -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Faint pitch markings -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none">
    <line x1="40" y1="256" x2="472" y2="256"/>
    <circle cx="256" cy="256" r="190"/>
  </g>

  <!-- Ball -->
  <circle cx="256" cy="256" r="186" fill="url(#ball)" stroke="#7a857e" stroke-width="2.5"/>

  <!-- Three Trionda fan blades — each is a wedge from center fanning out -->
  <g clip-path="url(#ballClip)">
    <!-- Top: Canada red. Wedge spans from -30° to 30° from center -->
    <path d="M 256 256 L 318 80 A 186 186 0 0 0 194 80 Z" fill="#EF1A2D"/>
    <!-- Lower-right: Mexico green. 90° to 150° -->
    <path d="M 256 256 L 432 318 A 186 186 0 0 0 370 410 Z" fill="#006847"/>
    <!-- Lower-left: USA blue. 210° to 270° -->
    <path d="M 256 256 L 142 410 A 186 186 0 0 0 80 318 Z" fill="#0033A0"/>
  </g>

  <!-- White star dots at each blade tip -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="256" cy="98" r="9"/>
    <circle cx="393" cy="335" r="9"/>
    <circle cx="119" cy="335" r="9"/>
  </g>

  <!-- Highlight gleam -->
  <ellipse cx="200" cy="160" rx="62" ry="36" fill="url(#gleam)"/>

  <!-- Center FIFA mark — small, doesn't fight blades -->
  <circle cx="256" cy="256" r="34" fill="#0A1845" stroke="#ffffff" stroke-width="3"/>
  <text x="256" y="267" text-anchor="middle" font-size="20" font-weight="900" fill="#FFD93D" font-family="Helvetica,Arial,sans-serif">FIFA</text>

  <!-- Edge shadow -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="2.5"/>
</svg>
